name: Sylphian-Profile
prefix: Sylphian-Profile
version: '${version}'

main: net.sylphian.minecraft.profile.SylphianProfile
api-version: '26.1.2'
load: POSTWORLD

authors: [QuackieMackie]
website: https://sylphian.net

dependencies:
  server:
    Sylphian-Database:
      load: BEFORE
      required: true
    Sylphian-Scoreboard:
      load: BEFORE
      required: true
    PlaceholderAPI:
      load: BEFORE
      required: false

permissions:
  sylphian.profile.playtime:
    description: View your playtime (/playtime).
    default: true