# ============================================================
#  Sylphian-Mining (content plugin for Sylphian-Gathering)
# ============================================================
#
#  items: the ore items this plugin exposes to Sylphian-Items. Each is
#         addressable as "sylphian-mining:<key>" and stamped so consumers
#         (e.g. Sylphian-Cooking) can match it as an ingredient.
#    material  a Bukkit material name
#    name      MiniMessage display name
#    lore      MiniMessage lore lines
#
#  nodes: the resource-node types. Placements (which node, and where) live in
#         Sylphian-Dimensions' config under each dimension's 'gathering' block,
#         keyed "sylphian-mining:<node-key>".
#    interaction     BREAK (mine the block) | INTERACT (right-click)
#    block           block shown while available
#    depleted-block  block shown while depleted
#    tool            PICKAXE | AXE | SHOVEL | HOE | ANY  (omit for no tool needed)
#    min-tool-tier   WOOD | GOLD | STONE | IRON | DIAMOND | NETHERITE
#    respawn-seconds seconds before a depleted node returns (0 = engine default)
#    skill           skill id to award XP in (needs Sylphian-Skills)
#    xp              XP awarded per harvest
#    min-skill-level minimum skill level required to harvest (0 = none)
#    loot            weighted table: each row is { item, weight, min-amount, max-amount }
#    modifiers       rollable variants; each { id, chance, yield-multiplier,
#                    block-override, bonus-loot } - first whose chance hits wins
# ============================================================

items:
  iron_ore_chunk:
    material: RAW_IRON
    name: "<white>Iron Ore Chunk"
    lore:
      - "<gray>A rough chunk of raw iron, torn from a rift vein."
  coal_lump:
    material: COAL
    name: "<dark_gray>Coal Lump"
    lore:
      - "<gray>A dense lump of coal from a rift seam."

nodes:
  iron_vein:
    interaction: BREAK
    block: IRON_ORE
    depleted-block: STONE
    tool: PICKAXE
    min-tool-tier: STONE
    respawn-seconds: 60
    skill: mining
    xp: 10
    min-skill-level: 0
    loot:
      - item: "sylphian-mining:iron_ore_chunk"
        weight: 1
        min-amount: 1
        max-amount: 3
    modifiers:
      - id: rich
        chance: 0.15
        yield-multiplier: 2.0
        block-override: DEEPSLATE_IRON_ORE
      - id: pristine
        chance: 0.05
        yield-multiplier: 1.0
        block-override: RAW_IRON_BLOCK
        bonus-loot:
          - item: "sylphian-mining:iron_ore_chunk"
            weight: 1
            min-amount: 2
            max-amount: 4

  coal_seam:
    interaction: BREAK
    block: COAL_ORE
    depleted-block: STONE
    tool: PICKAXE
    min-tool-tier: WOOD
    respawn-seconds: 45
    skill: mining
    xp: 6
    min-skill-level: 0
    loot:
      - item: "sylphian-mining:coal_lump"
        weight: 1
        min-amount: 1
        max-amount: 4
    modifiers:
      - id: rich
        chance: 0.15
        yield-multiplier: 2.0
        block-override: DEEPSLATE_COAL_ORE
