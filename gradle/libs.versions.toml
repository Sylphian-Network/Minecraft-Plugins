[versions]
paper = "26.1.2.build.+"
jdbi = "3.47.0"
hikari = "6.2.1"
mariadb = "3.5.1"
caffeine = "3.1.8"
velocity = "3.5.0-SNAPSHOT"

[libraries]
paper-api        = { module = "io.papermc.paper:paper-api",                   version.ref = "paper" }
jdbi-core        = { module = "org.jdbi:jdbi3-core",                          version.ref = "jdbi" }
jdbi-sqlobject   = { module = "org.jdbi:jdbi3-sqlobject",                     version.ref = "jdbi" }
hikari           = { module = "com.zaxxer:HikariCP",                          version.ref = "hikari" }
mariadb          = { module = "org.mariadb.jdbc:mariadb-java-client",         version.ref = "mariadb" }
caffeine         = { module = "com.github.ben-manes.caffeine:caffeine",       version.ref = "caffeine" }
velocity-api     = { module = "com.velocitypowered:velocity-api",             version.ref = "velocity" }

[plugins]
shadow = { id = "com.gradleup.shadow", version = "9.4.1" }
