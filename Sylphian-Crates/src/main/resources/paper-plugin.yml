name: Sylphian-Crates
prefix: Sylphian-Crates
version: '${version}'

main: net.sylphian.minecraft.crates.SylphianCrates
api-version: '26.1.2'
load: POSTWORLD

authors: [QuackieMackie]
website: https://sylphian.net

dependencies:
  server:
    Sylphian-Items:
      load: BEFORE
      required: true
    Sylphian-Economy:
      load: BEFORE
      required: false
    CommandAPI:
      load: BEFORE
      required: true

permissions:
  sylphian.crates.admin:
    description: Administrative crate commands (/sylphian-crates).
    default: op
  sylphian.crates.open:
    description: Open crates (/crates).
    default: true