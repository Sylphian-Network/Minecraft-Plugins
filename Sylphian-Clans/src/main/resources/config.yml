# Unique identifier for this server instance.
# Once set should not be changed.
server-id: default

# Maximum number of chunks a single clan may claim.
max-claims-per-clan: 50

# Maximum number of warps a single clan may create.
max-warps-per-clan: 5

# How long (in seconds) a clan invite remains valid before expiring.
invite-expiry-seconds: 300

# How long (in seconds) a player must stand still before a clan warp teleports them.
home-warmup-seconds: 3

# Permissions granted automatically when a member accepts an invite.
# GRANT_* permissions are never in this list, only the LEADER may assign those.
default-member-permissions:
  - BREAK_BLOCKS
  - PLACE_BLOCKS
  - KILL_ANIMALS
  - KILL_MONSTERS
  - OPEN_CONTAINERS
  - USE_DOORS
  - INTERACT
