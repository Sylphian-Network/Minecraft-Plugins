name: Sylphian-Clans
prefix: Sylphian-Clans
version: '${version}'

main: net.sylphian.minecraft.clans.SylphianClans
api-version: '26.1.2'
load: POSTWORLD

authors: [QuackieMackie]
website: https://sylphian.net

dependencies:
  server:
    Sylphian-Database:
      load: BEFORE
      required: true

permissions:
  sylphian.clans.use:
    description: Use clan commands (/clan).
    default: true
  sylphian.clans.admin:
    description: Administrative clan commands (/sylphian-clans).
    default: op