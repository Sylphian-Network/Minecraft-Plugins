# Set to true if running without a Velocity proxy
# Set to false if Sylphian-Verify-Velocity is handling verification on the proxy
standalone: true

# XenForo API — only used in standalone mode
api_key: ""
api_base_url: "http://localhost"

# Verification behaviour — only used in standalone mode
max_strikes: 3
attempt_expiry_minutes: 30
cooldown_minutes: 15
uuid_attempt_limit: 5
ip_attempt_limit: 10
api_timeout_seconds: 10
strike_on_api_failure: true

# Kick and warning messages — only used in standalone mode
messages:
  not_linked: "Your account has not been linked to the forum. Please visit example.com to link your account."
  not_confirmed: "Your forum account is linked but not confirmed. Please confirm it at example.com."
  brute_force_blocked: "Too many failed attempts. Please try again in {time} minutes."
  re_verification_failed: "Your account is no longer verified. Please ensure your account is linked at example.com."
  api_error: "An error occurred while verifying your account. Please try again later."

# Database — required for this plugin to write identity data
database:
  enabled: false
