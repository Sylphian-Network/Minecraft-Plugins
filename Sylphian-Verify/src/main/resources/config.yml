# XenForo API
api_key: ""
api_base_url: "http://localhost"

# Verification behaviour
max_strikes: 3
verification_interval_minutes: 10
attempt_expiry_minutes: 30
cooldown_minutes: 15
uuid_attempt_limit: 5
ip_attempt_limit: 10
api_timeout_seconds: 10
strike_on_api_failure: true

# Kick and warning messages (MiniMessage format)
messages:
  not_linked: "<red><bold>Your account has not been linked to the forum. Please visit sylphian.net to link your account."
  not_confirmed: "<red><bold>Your forum account is linked but not confirmed. Please confirm it at sylphian.net."
  brute_force_blocked: "<red>Too many failed attempts. Please try again in <time>."
  re_verification_failed: "<red><bold>Your account is no longer verified. Please ensure your account is linked at sylphian.net."
  api_error: "<red>An error occurred while verifying your account. Please try again later."
