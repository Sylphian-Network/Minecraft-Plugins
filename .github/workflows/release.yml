name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build plugin jars
        run: ./gradlew build

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            Sylphian-Verify-Paper/build/libs/Sylphian-Verify-Paper.jar \
            Sylphian-Verify-Velocity/build/libs/Sylphian-Verify-Velocity.jar \
            Sylphian-Database/build/libs/Sylphian-Database.jar \
            Sylphian-Core/build/libs/Sylphian-Core.jar \
            Sylphian-Crates/build/libs/Sylphian-Crates.jar \
            Sylphian-Profile/build/libs/Sylphian-Profile.jar \
            Sylphian-Scoreboard/build/libs/Sylphian-Scoreboard.jar \
            Sylphian-Cooking/build/libs/Sylphian-Cooking.jar \
            Sylphian-Fishing/build/libs/Sylphian-Fishing.jar \
            --title "${{ github.ref_name }}" \
            --generate-notes