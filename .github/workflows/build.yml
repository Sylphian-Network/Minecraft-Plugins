name: Build

on:
  push:
    branches: [ master ]
    paths:
      - '**.java'
      - '**.gradle.kts'
      - 'gradle/**'
  pull_request:
    branches: [ master ]
    paths:
      - '**.java'
      - '**.gradle.kts'
      - 'gradle/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build plugin jars
        run: ./gradlew build