# =============================================================
# Sylphian Fishing - Fish Configuration
# =============================================================
#
# This file defines every fish that can be caught on the server.
# Fish are selected by first filtering eligible fish for the
# player's biome, Y coordinate, and time of day, then rolling
# a rarity, and finally picking a fish by weight within that
# rarity pool.
#
# Fields:
# -------
# material:     Bukkit Material name for the item dropped.
#               See: https://jd.papermc.io/paper/26.1.2/org/bukkit/Material.html
#
# display-name: MiniMessage formatted name shown to players.
#               See: https://docs.advntr.dev/minimessage/format.html
#
# description:  MiniMessage lore text. Use \n for line breaks.
#
# rarity:       Must match a key in config.yml rarities section.
#               e.g. COMMON, UNCOMMON, RARE, EPIC, LEGENDARY, MYTHIC
#
# weight:       Relative chance within the rarity pool. Higher values
#               mean this fish appears more often than others of the
#               same rarity in the same biome.
#
# min-weight:   Minimum physical catch weight in kg.
# max-weight:   Maximum physical catch weight in kg.
#
# biomes:       Biomes where this fish can appear. Use "ALL" for no
#               restriction, or list Minecraft biome names.
#               See: https://minecraft.wiki/w/Biome#Biome_IDs
#
# min-y:        (Optional) Minimum Y coordinate for this fish to appear.
# max-y:        (Optional) Maximum Y coordinate for this fish to appear.
#               Omitting both means no height restriction.
#
# min-time:     (Optional) Minimum world time in ticks for this fish to appear.
# max-time:     (Optional) Maximum world time in ticks for this fish to appear.
#               Supports overnight wrap-around — if min-time is greater than
#               max-time, the window crosses midnight. For example:
#                 min-time: 13000, max-time: 1000  →  night only
#               Omitting both means no time restriction.
#
# Time of day reference (ticks):
#   0     = 06:00  Dawn
#   1000  = 07:00  Early Morning
#   6000  = 12:00  Noon
#   12000 = 18:00  Dusk
#   13000 = 19:00  Early Night
#   18000 = 00:00  Midnight
#   23000 = 05:00  Late Night
# =============================================================

