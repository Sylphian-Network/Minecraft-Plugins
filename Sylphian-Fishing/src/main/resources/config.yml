# =============================================================
# Sylphian Fishing - Main Configuration
# =============================================================
#
# MiniMessage formatting reference: https://docs.advntr.dev/minimessage/format.html
# Bukkit sound reference:           https://minecraft.wiki/w/Sounds.json
# Bukkit particle reference:        https://jd.papermc.io/paper/26.1.2/org/bukkit/Particle.html
# =============================================================


# =============================================================
# Rarity Tiers
# =============================================================
# Defines every rarity tier that fish can belong to.
# Rarities are checked from rarest to most common on each catch.
# A single random roll (0.0–1.0) is compared against each rarity's
# chance in descending order — the first match wins.
#
# Effective catch odds (approximate):
#   MYTHIC:    1%        (roll ≤ 0.01)
#   LEGENDARY: 2%        (roll 0.01–0.03)
#   EPIC:      5%        (roll 0.03–0.08)
#   RARE:      12%       (roll 0.08–0.20)
#   UNCOMMON:  30%       (roll 0.20–0.50)
#   COMMON:    50%       (roll 0.50–1.00)
#
# Fields:
# -------
# chance
#   Probability threshold for this rarity (0.0–1.0).
#   Must be unique per rarity and in ascending order from rarest to most common.
#
# color
#   MiniMessage color tag applied to the rarity display name in item lore
#   and chat messages. e.g. "<gold>", "<gradient:aqua:white>"
#
# mutation-multiplier
#   Scales the base mutation chance for fish of this rarity.
#   A value of 2.0 doubles the mutation chance; 0.5 halves it.
#   See the mutations section for base chances.
#
# catch-effects
#   Effects triggered when a fish of this rarity is caught.
#   Each effect type can be independently enabled or disabled.
#
#   sound:
#     name    — Minecraft sound ID (e.g. "minecraft:entity.player.levelup")
#     volume  — Audible range multiplier (1.0 = normal, 2.0 = twice the range)
#     pitch   — Playback speed and pitch (0.5 = low/slow, 2.0 = high/fast)
#
#   particles:
#     type     — Bukkit Particle enum name (e.g. "TOTEM", "DRAGON_BREATH")
#     count    — Number of particles spawned
#     offset-x/y/z — Spread radius on each axis in blocks
#
#   title:
#     title/subtitle — MiniMessage formatted strings shown on screen
#     fade-in/stay/fade-out — Duration in ticks (20 ticks = 1 second)
#
#   broadcast:
#     message — MiniMessage string sent to all online players.
#               Use {player} to insert the catching player's name.
# =============================================================

rarities:
  COMMON:
    chance: 1.0
    color: "<white>"
    mutation-multiplier: 0.5
    catch-effects:
      sound:
        enabled: false
      particles:
        enabled: false
      title:
        enabled: false
      broadcast:
        enabled: false

  UNCOMMON:
    chance: 0.50
    color: "<green>"
    mutation-multiplier: 0.8
    catch-effects:
      sound:
        enabled: true
        name: "minecraft:entity.experience_orb.pickup"
        volume: 1.0
        pitch: 1.2
      particles:
        enabled: false
      title:
        enabled: false
      broadcast:
        enabled: false

  RARE:
    chance: 0.20
    color: "<aqua>"
    mutation-multiplier: 1.0
    catch-effects:
      sound:
        enabled: true
        name: "minecraft:entity.player.levelup"
        volume: 0.5
        pitch: 1.5
      particles:
        enabled: true
        type: "ENCHANT"
        count: 20
        offset-x: 0.5
        offset-y: 0.5
        offset-z: 0.5
      title:
        enabled: false
      broadcast:
        enabled: false

  EPIC:
    chance: 0.08
    color: "<dark_purple>"
    mutation-multiplier: 1.5
    catch-effects:
      sound:
        enabled: true
        name: "minecraft:ui.toast.challenge_complete"
        volume: 0.7
        pitch: 1.0
      particles:
        enabled: true
        type: "WITCH"
        count: 30
        offset-x: 0.5
        offset-y: 1.0
        offset-z: 0.5
      title:
        enabled: true
        title: "<dark_purple><bold>EPIC CATCH!"
        subtitle: "<gray>You caught an epic fish!"
        fade-in: 10
        stay: 40
        fade-out: 10
      broadcast:
        enabled: false

  LEGENDARY:
    chance: 0.03
    color: "<gold>"
    mutation-multiplier: 2.0
    catch-effects:
      sound:
        enabled: true
        name: "minecraft:item.totem.use"
        volume: 1.0
        pitch: 0.8
      particles:
        enabled: true
        type: "TOTEM"
        count: 50
        offset-x: 0.8
        offset-y: 1.0
        offset-z: 0.8
      title:
        enabled: true
        title: "<gold><bold>LEGENDARY CATCH!"
        subtitle: "<yellow>An incredible fish!"
        fade-in: 10
        stay: 60
        fade-out: 20
      broadcast:
        enabled: true
        message: "<gold>✦ <white>{player} <gray>caught a <gold>Legendary <gray>fish!"

  MYTHIC:
    chance: 0.01
    color: "<light_purple>"
    mutation-multiplier: 3.0
    catch-effects:
      sound:
        enabled: true
        name: "minecraft:entity.ender_dragon.growl"
        volume: 1.0
        pitch: 0.5
      particles:
        enabled: true
        type: "DRAGON_BREATH"
        count: 80
        offset-x: 1.0
        offset-y: 1.5
        offset-z: 1.0
      title:
        enabled: true
        title: "<light_purple><bold>✦ MYTHIC CATCH! ✦"
        subtitle: "<gray>The rarest of catches..."
        fade-in: 10
        stay: 80
        fade-out: 20
      broadcast:
        enabled: true
        message: "<light_purple>✦ <white>{player} <gray>caught a <light_purple>Mythic <gray>fish! <dark_gray>(Extremely rare!)"


# =============================================================
# Rarity Catch Chance — Weather Modifiers
# =============================================================
# Multipliers applied to each rarity's base catch chance depending
# on the current weather. These scale the probability of a rarity
# being selected on each catch roll — they do not affect fish weight,
# mutations, or bite speed (see bite-timer for that).
#
# A multiplier of 1.0 means no change.
# A multiplier of 2.0 doubles the effective chance of that rarity.
# A multiplier of 0.5 halves it.
#
# The final chance is clamped to a maximum of 1.0 (100%).
#
# Example: RARE base chance is 0.20. During a THUNDERSTORM with
# multiplier 1.5, the effective chance becomes min(0.30, 1.0) = 0.30.
# =============================================================

weather-modifiers:
  CLEAR:
    COMMON:    1.0
    UNCOMMON:  1.0
    RARE:      1.0
    EPIC:      1.0
    LEGENDARY: 1.0
    MYTHIC:    1.0

  RAIN:
    COMMON:    0.8    # Slightly fewer common fish in the rain
    UNCOMMON:  1.0
    RARE:      1.2    # Rain stirs up rarer species
    EPIC:      1.3
    LEGENDARY: 1.5
    MYTHIC:    1.0

  THUNDERSTORM:
    COMMON:    0.6    # Common fish retreat during storms
    UNCOMMON:  0.8
    RARE:      1.5    # Storms drive rare fish to the surface
    EPIC:      2.0
    LEGENDARY: 3.0
    MYTHIC:    2.0    # Even mythic fish are disturbed by extreme weather


# =============================================================
# Bite Timer
# =============================================================
# Controls how long a player waits for a fish to appear after casting,
# and how long the fish nibbles before biting once it appears.
#
# Wait time formula:
#   delay = random value between base-min and base-max
#           × rarity modifier for the pre-rolled rarity
#           × weather modifier for current weather
#           × bait zone multiplier (if inside an active zone)
#
# The pre-rolled rarity is an estimate used only for timing — the
# actual catch is rolled independently when the fish bites, so the
# wait time hints at what might be coming but does not guarantee it.
#
# All values are in ticks. 20 ticks = 1 second.
# Minimum enforced floor is 20 ticks (1 second) regardless of modifiers.
#
# rarity-modifiers:
#   Multiplies the base delay for the pre-rolled rarity.
#   Rarer fish take longer to appear, building anticipation.
#   1.0 = no change, 2.0 = twice as long, 0.5 = half as long.
#
# weather-modifiers:
#   Multiplies the delay based on current weather.
#   Values below 1.0 reduce the wait (faster bites).
#   Values above 1.0 increase it (slower bites).
#
# lure-timer:
#   Controls how long the fish nibbles before committing to the bite.
#   Not affected by weather or bait zones — only rarity.
#   Rarity modifiers follow the same rules as above.
# =============================================================

bite-timer:
  base-min: 100   # ~5 seconds  — fastest possible bite
  base-max: 600   # ~30 seconds — slowest base bite before modifiers

  rarity-modifiers:
    COMMON:    1.0   # No change
    UNCOMMON:  1.2   # 20% longer
    RARE:      1.5   # 50% longer
    EPIC:      2.0   # Double the wait
    LEGENDARY: 2.8   # Nearly triple
    MYTHIC:    4.0   # ~2 minutes at base-max — extremely rare event

  weather-modifiers:
    CLEAR:        1.0    # Standard wait
    RAIN:         0.75   # 25% faster — rain attracts fish to the surface
    THUNDERSTORM: 0.5    # 50% faster — storms drive fish into a frenzy

  lure-timer:
    base-min: 20   # 1 second  — fastest nibble
    base-max: 80   # 4 seconds — slowest base nibble before modifiers

    rarity-modifiers:
      COMMON: 1.0
      UNCOMMON: 1.3
      RARE: 1.6
      EPIC: 2.0
      LEGENDARY: 2.5
      MYTHIC: 3.0

# =============================================================
# Mutations
# =============================================================
# Mutations are special modifiers applied to a fish at the moment
# of catching, before the item is given to the player.
#
# The chance a mutation applies is calculated as:
#   final chance = base-chance × rarity's mutation-multiplier
#
# Example: super_fish base-chance is 0.05 (5%).
# Caught as LEGENDARY (multiplier 2.0) → 10% chance of mutation.
# Caught as COMMON (multiplier 0.5)    → 2.5% chance of mutation.
#
# Fields:
# -------
# enabled      — Whether this mutation is active at all.
# base-chance  — Base probability before rarity multiplier (0.0–1.0).
# effects      — Potion effects applied to the player when the mutated
#               fish is consumed. Each effect requires:
#                 effect    — Minecraft effect ID (e.g. "regeneration")
#                 duration  — Duration in ticks (20 = 1 second)
#                 amplifier — Effect level, 0-indexed (0 = level I)
# =============================================================

# =============================================================
# Fishing Skill (Sylphian-Skills integration)
# =============================================================
# Requires Sylphian-Skills to be installed. If it is absent,
# this section is ignored and no XP or skill effects are applied.
#
# Active skills are triggered by sneaking and right-clicking
# while holding a fishing rod and not currently casting.
# The highest unlocked skill not on cooldown activates.
#
# Levels:
#   5  - Active:  Patient Angler — next cast bites quickly
#   10 - Passive: Line Mastery   — permanent bite timer reduction
#   15 - Active:  Double Haul    — next catch is duplicated
#   20 - Passive: Steady Current — consecutive catches in the same spot stack bite timer reductions
#   25 - Active:  Fisher's Frenzy — 60s buff: faster bites and double XP
#   30 - Passive: Master Angler  — additional timer reduction and XP multiplier
# =============================================================

fishing-skill:
  xp-per-catch: 10

  # Level 5 - Active: Patient Angler
  patient-angler:
    cooldown-seconds: 90
    min-wait-ticks: 60     # 3 seconds
    max-wait-ticks: 100    # 5 seconds

  # Level 10 - Passive: Line Mastery
  line-mastery:
    reduction-percent: 15.0

  # Level 15 - Active: Double Haul
  double-haul:
    cooldown-seconds: 180

  # Level 20 - Passive: Steady Current
  steady-current:
    stack-reduction-percent: 5.0   # per stack
    max-stacks: 5                  # 25% maximum from this passive
    range-blocks: 15.0             # how far to move before the streak resets

  # Level 25 - Active: Fisher's Frenzy
  fishers-frenzy:
    cooldown-seconds: 300
    duration-seconds: 60
    reduction-percent: 60.0        # bite timer reduction during frenzy

  # Level 30 - Passive: Master Angler
  master-angler:
    reduction-percent: 20.0        # stacks with Line Mastery
    xp-multiplier: 1.5


mutations:
  super_fish:
    enabled: true
    base-chance: 0.05
    effects:
      - effect: REGENERATION
        duration: 100
        amplifier: 1
      - effect: ABSORPTION
        duration: 2400
        amplifier: 0
      - effect: SATURATION
        duration: 20
        amplifier: 1