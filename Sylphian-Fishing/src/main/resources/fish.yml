# =============================================================
# Sylphian Fishing - Fish Configuration
# =============================================================
#
# This file defines every fish that can be caught on the server.
# Fish are selected by first filtering eligible fish for the
# player's biome and Y coordinate, then rolling a rarity, and
# finally picking a fish by weight within that rarity pool.
#
# Fields:
# -------
# material:     Bukkit Material name for the item dropped.
#               See: https://jd.papermc.io/paper/1.21/org/bukkit/Material.html
#
# display-name: MiniMessage formatted name shown to players.
#               See: https://docs.advntr.dev/minimessage/format.html
#
# description:  MiniMessage lore text. Use \n for line breaks.
#
# rarity:       Must match a key in config.yml rarities section.
#               e.g. COMMON, UNCOMMON, RARE, EPIC, LEGENDARY, MYTHIC
#
# weight:       Relative chance within the rarity pool. Higher values
#               mean this fish appears more often than others of the
#               same rarity in the same biome.
#
# min-weight:   Minimum physical catch weight in kg.
# max-weight:   Maximum physical catch weight in kg.
#
# biomes:       Biomes where this fish can appear. Use "ALL" for no
#               restriction, or list Minecraft biome names.
#               See: https://minecraft.wiki/w/Biome#Biome_IDs
#
# min-y:        (Optional) Minimum Y coordinate for this fish to appear.
# max-y:        (Optional) Maximum Y coordinate for this fish to appear.
#               Omitting both means no height restriction.
# =============================================================

fish:
  common_cod:
    material: COD
    display-name: "<white>Common Cod"
    description: "<gray>A reliable catch, found in most waters."
    rarity: COMMON
    weight: 40
    min-weight: 0.3
    max-weight: 2.0
    biomes: ALL

  river_salmon:
    material: SALMON
    display-name: "<white>River Salmon"
    description: "<gray>Fights hard against the current."
    rarity: COMMON
    weight: 35
    min-weight: 1.0
    max-weight: 4.5
    biomes: ALL

  electric_puffer:
    material: PUFFERFISH
    display-name: "<yellow>⚡ Electric Puffer"
    description: "<gray>Crackles with a strange energy.\n<yellow>Handle with care."
    rarity: RARE
    weight: 15
    min-weight: 0.5
    max-weight: 1.5
    biomes: ALL

  heart_of_the_deep:
    material: HEART_OF_THE_SEA
    display-name: "<gradient:dark_purple:light_purple>❤ Heart of the Deep</gradient>"
    description: "<gray>Pulled from the darkest trench.\nFew have ever seen one."
    rarity: LEGENDARY
    weight: 3
    min-weight: 0.1
    max-weight: 0.3
    biomes:
      - DEEP_OCEAN
      - DEEP_COLD_OCEAN
      - DEEP_FROZEN_OCEAN

  sunscale_koi:
    material: TROPICAL_FISH
    display-name: "<gold>☀ Sunscale Koi"
    description: "<gray>Its scales shimmer like a summer sunrise."
    rarity: UNCOMMON
    weight: 24
    min-weight: 1.0
    max-weight: 3.2
    biomes:
      - RIVER
      - BAMBOO_JUNGLE
      - JUNGLE

  mangrove_snapper:
    material: COD
    display-name: "<green>Mangrove Snapper"
    description: "<gray>Thrives among tangled roots and muddy waters."
    rarity: COMMON
    weight: 32
    min-weight: 0.8
    max-weight: 2.8
    biomes:
      - MANGROVE_SWAMP
      - SWAMP

  bog_lurker:
    material: PUFFERFISH
    display-name: "<dark_green>Bog Lurker"
    description: "<gray>Its glowing eyes peer through swamp fog."
    rarity: RARE
    weight: 10
    min-weight: 1.5
    max-weight: 5.0
    biomes:
      - SWAMP
      - MANGROVE_SWAMP

  crystal_carp:
    material: TROPICAL_FISH
    display-name: "<aqua>❄ Crystal Carp"
    description: "<gray>Cold to the touch and clear as ice."
    rarity: UNCOMMON
    weight: 18
    min-weight: 1.2
    max-weight: 4.0
    biomes:
      - FROZEN_RIVER
      - ICE_SPIKES
      - SNOWY_TAIGA