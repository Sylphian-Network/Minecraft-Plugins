name: Sylphian-Fishing
prefix: Sylphian-Fishing
version: '${version}'

main: net.sylphian.minecraft.fishing.SylphianFishing
bootstrapper: net.sylphian.minecraft.fishing.SylphianFishingBootstrap
api-version: '26.1.2'
load: POSTWORLD

authors: [QuackieMackie]
website: https://sylphian.net

dependencies:
  server:
    Sylphian-Database:
      load: BEFORE
      required: true

commands:
  encyclopaedia:
    description: Track your fishing discoveries and collection progress.
    usage: /encyclopaedia
  test_fishing:
    description: Run simulations under different configurable conditions.
    usage: /test_fishing