name: Sylphian-Fishing
prefix: Sylphian-Fishing
version: '${version}'

main: net.sylphian.minecraft.fishing.SylphianFishing
bootstrapper: net.sylphian.minecraft.fishing.SylphianFishingBootstrap
api-version: '26.1.2'
load: POSTWORLD

authors: [QuackieMackie]
website: https://sylphian.net

dependencies:
  server:
    Sylphian-Database:
      load: BEFORE
      required: true
    Sylphian-Scoreboard:
      load: BEFORE
      required: true
    Sylphian-Core:
      load: BEFORE
      required: true
    Sylphian-Crates:
      load: BEFORE
      required: false

commands:
  sylphian-fishing:
    description: Administrative commands for Sylphian Fishing.
    usage: /sylphian-fishing <reload|test-effect|test-fishing>
  encyclopaedia:
    description: Track your fishing discoveries and collection progress.
    usage: /encyclopaedia