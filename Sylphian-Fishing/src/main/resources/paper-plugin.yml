name: Sylphian-Fishing
prefix: Sylphian-Fishing
version: '${version}'

main: net.sylphian.minecraft.fishing.SylphianFishing
bootstrapper: net.sylphian.minecraft.fishing.SylphianFishingBootstrap
api-version: '26.1.2'
load: POSTWORLD

authors: [QuackieMackie]
website: https://sylphian.net

dependencies:
  server:
    Sylphian-Database:
      load: BEFORE
      required: true
    Sylphian-Scoreboard:
      load: BEFORE
      required: true
    Sylphian-Items:
      load: BEFORE
      required: true
    Sylphian-Crates:
      load: BEFORE
      required: false
    Sylphian-Skills:
      load: BEFORE
      required: false

permissions:
  sylphian.fishing.admin:
    description: Administrative fishing commands (/sylphian-fishing).
    default: op
  sylphian.fishing.encyclopaedia:
    description: Open the fish encyclopaedia (/encyclopaedia).
    default: true